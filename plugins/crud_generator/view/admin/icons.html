    <style>
        .header {
            text-align: center;
            margin: 15px 15px 0px 15px;
            background: white;
            padding: 10px;
            border-radius: 10px;
        }

        .stats {
            margin: 10px 0;
            padding: 15px;
            background: #e3f2fd;
            border-radius: 5px;
            text-align: center;
        }

        .icons-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
            gap: 15px;
            margin-top: 20px;
        }

        .icon-item {
            background: white;
            padding: 20px;
            border-radius: 8px;
            text-align: center;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
            transition: transform 0.2s, box-shadow 0.2s;
            cursor: pointer;
        }

        .icon-item:hover {
            transform: translateY(-2px);
            box-shadow: 0 4px 15px rgba(0,0,0,0.15);
        }

        .icon-display {
            font-size: 32px;
            margin-bottom: 10px;
            color: #333;
        }

        .icon-name {
            font-size: 12px;
            color: #666;
            word-break: break-all;
            font-family: monospace;
        }

        .category-section {
            margin: 10px 0;
        }

        .category-title {
            background: #007bff;
            color: white;
            padding: 10px 20px;
            border-radius: 5px;
            margin-bottom: 15px;
            font-size: 18px;
            font-weight: bold;
        }

        .no-results {
            text-align: center;
            padding: 40px;
            color: #666;
            font-size: 18px;
        }

    </style>
</head>
<body>
    <div class="header">
        <input type="text" class="form-control" id="searchBox" placeholder="Search icons..." />        
        <div class="stats">
            <span id="iconCount">Loading icons...</span>
        </div>
    </div>

    <div id="iconsContainer" style="padding: 20px;"></div>
