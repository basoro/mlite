<div class="row">
    <form action="{?=url(ADMIN.'/dokter_ralan/saveSettings')?}" method="POST">
        <div class="col-md-6">
            <div class="panel panel-default">
                <div class="panel-heading">
                    <h3 class="panel-title">{?=isset_or($settings.title)?}</h3>
                </div>
            	  <div class="panel-body">
                    <div class="form-group">
                         <label>Otomatis Sudah Periksa</label>
                         <div class="radio">
                             <label class="radio-inline">
                                <input type="radio" name="dokter_ralan[set_sudah]" value="ya" {if: $settings.dokter_ralan.set_sudah == 'ya'}checked{/if} /> Ya
                             </label>
                             <label class="radio-inline">
                                <input type="radio" name="dokter_ralan[set_sudah]" value="tidak" {if: $settings.dokter_ralan.set_sudah == 'tidak'}checked{/if} /> Tidak
                             </label>
                         </div>
                    </div>
                    <hr>
                    <h4>Pengaturan API SNOMED CT <span class="small">(By Dody Naftali)</span></h4>
                    <div class="form-group">
                        <label>Base URL API SNOMED</label>
                        <input type="text" name="dokter_ralan[snomed_api_url]" class="form-control" value="{?=isset_or($settings.dokter_ralan.snomed_api_url)?}" placeholder="https://kodemedis.thing.my.id">
                        <small class="help-block">URL dasar untuk mengakses API Kodemedis SNOMED CT.</small>
                    </div>
                    <div class="form-group">
                        <label>Username API SNOMED</label>
                        <input type="password" name="dokter_ralan[snomed_username]" class="form-control" value="{?=isset_or($settings.dokter_ralan.snomed_username)?}" placeholder="Email akun kodemedis">
                    </div>
                    <div class="form-group">
                        <label>Password API SNOMED</label>
                        <input type="password" name="dokter_ralan[snomed_password]" class="form-control" value="{?=isset_or($settings.dokter_ralan.snomed_password)?}" placeholder="Password akun kodemedis">
                    </div>
                    <input type="submit" name="save" class="btn btn-primary" value="Simpan" />
                </div>
            </div>
        </div>
    </form>
</div>
