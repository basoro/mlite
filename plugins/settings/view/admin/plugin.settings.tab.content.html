<p class="help-block">{?=isset_or($value.desc)?}</p>
{if: !empty($value.content)}
    {?=isset_or($value.content)?}
{else}
    <iframe
        src="{?=isset_or($value.url)?}"
        title="Pengaturan {?=isset_or($value.name)?}"
        style="width:100%;min-height:700px;border:0;"
        loading="lazy"
        sandbox="allow-forms"
        referrerpolicy="no-referrer">
        Browser Anda tidak mendukung iframe. Buka pengaturan langsung di
        <a href="{?=isset_or($value.url)?}">halaman ini</a>.
    </iframe>
{/if}
