
<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <meta http-equiv="refresh" content="180">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta name="description" content="">
    <title>{?=isset_or($title)?} - {?=isset_or($settings.nama_instansi)?}</title>
    <link rel="icon" href="{?=url()?}/favicon.png" type="image/x-icon">

    <style media="screen">

        font-family: "Helvetica Neue",Helvetica,Arial,sans-serif;
        color: #fff;
      	background: #0264d6;
      	height:calc(100vh);
      	width:100%;
      }
      li:nth-child(even) {background: #0264d6; color: #ffffff;}
      li:nth-child(odd) {background: #ffffff; color: #0264d6;}
      footer {
          position: fixed;
          right: 0px;
          bottom: 0px;
          height: 40px;
          width: calc(100% - 0px);
          font-size: 14px;
          color: #fff;
      }

      <tr>

</div>

<script>
  $(document).ready(function(){
    loadOperasi();
  }); 
  function loadOperasi() {
  $.get('{?=url()?}/anjungan/ajax?show=operasi-display', function(html){
    $("#list_operasi").html(html);  
    
  });
}
</script>
