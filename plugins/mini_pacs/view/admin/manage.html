<article class="row">
    <div class="col-md-12">
        <div class="panel panel-default">
            <div class="panel-heading">
                <h3 class="panel-title pull-left">{$pacs.title}</h3>
                <div class="pull-right">
                    <button class="btn btn-success btn-xs" data-toggle="modal" data-target="#uploadModal"><i class="fa fa-upload"></i> Upload Image/DICOM</button>
                </div>
                <div class="clearfix"></div>
            </div>
            <div class="panel-body">
                <div class="table-responsive">
                    <table class="table table-striped table-hover pacs-table" id="pacsTable">
                        <thead>
                            <tr>
                                <th>ID</th>
                                <th>No Rawat</th>
                                <th>Nama Pasien</th>
                                <th>Modality</th>
                                <th>Study Date</th>
                                <th>Aksi</th>
                            </tr>
                        </thead>
                        <tbody></tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>
</article>

<!-- Modal Upload -->
<div class="modal fade" id="uploadModal" tabindex="-1" role="dialog" aria-labelledby="uploadModalLabel">
  <div class="modal-dialog" role="document">
    <div class="modal-content">
      <form action="{?=url([ADMIN, 'mini_pacs', 'upload'])?}" method="post" enctype="multipart/form-data">
      <div class="modal-header">
        <button type="button" class="close" data-dismiss="modal" aria-label="Close"><span aria-hidden="true">&times;</span></button>
        <h4 class="modal-title" id="uploadModalLabel">Upload Image atau DICOM</h4>
      </div>
      <div class="modal-body">
        <div class="form-group">
            <label>No Rawat Pasien</label>
            <input type="text" class="form-control" name="no_rawat" placeholder="Cth: 2026/01/01/000001" required>
        </div>
        <div class="form-group">
            <label>Modality</label>
            <input type="text" class="form-control" name="modality" placeholder="Cth: CR, CT, MR, US" value="CR" required>
        </div>
        <div class="form-group">
            <label>Pilih Gambar/DICOM (JPG/PNG/DCM)</label>
            <input type="file" class="form-control" name="file_image" accept=".jpg,.jpeg,.png,.dcm" required>
            <p class="help-block">File JPG/PNG akan otomatis dikonversi menggunakan img2dcm. File DCM akan disesuaikan datanya.</p>
        </div>
      </div>
      <div class="modal-footer">
        <button type="button" class="btn btn-default" data-dismiss="modal">Batal</button>
        <button type="submit" class="btn btn-primary">Simpan / Konversi</button>
      </div>
      </form>
    </div>
  </div>
</div>

<!-- Modal Satusehat Response -->
<div class="modal fade" id="satusehatModal" tabindex="-1" role="dialog" aria-labelledby="satusehatModalLabel">
  <div class="modal-dialog modal-lg" role="document">
    <div class="modal-content">
      <div class="modal-header">
        <button type="button" class="close" data-dismiss="modal" aria-label="Close"><span aria-hidden="true">&times;</span></button>
        <h4 class="modal-title" id="satusehatModalLabel">Respon Satu Sehat</h4>
      </div>
      <div class="modal-body">
        <h5><strong>Respon DICOM (STOW-RS)</strong></h5>
        <pre><code id="satusehatDicomResponse"></code></pre>
        <hr>
        <h5><strong>Respon FHIR (ImagingStudy)</strong></h5>
        <pre><code id="satusehatFhirResponse"></code></pre>
      </div>
      <div class="modal-footer">
        <button type="button" class="btn btn-default" data-dismiss="modal">Tutup</button>
      </div>
    </div>
  </div>
</div>
