<!DOCTYPE HTML>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mini PACS Viewer</title>
    <link rel="stylesheet" type="text/css" href="{?=url()?}/assets/css/font-awesome.css">
    <link rel="stylesheet" type="text/css" href="{?=isset_or($baseUrl)?}/css/admin/styles.css?v=2">
    <!-- Bootstrap 3 CSS -->
    <link rel="stylesheet" href="https://maxcdn.bootstrapcdn.com/bootstrap/3.4.1/css/bootstrap.min.css">
    <style>
        .app-container {
            display: flex;
            height: 100vh;
            flex-direction: column;
            background-color: #000;
            color: #fff;
        }

        .main-content {
            display: flex;
            flex: 1;
            overflow: hidden;
        }

        .sidebar {
            width: 300px;
            background-color: #1a1a1a;
            display: flex;
            flex-direction: column;
            border-right: 1px solid #333;
        }

        .series-container {
            flex: 1;
            overflow-y: auto;
            padding: 10px;
        }

        .metadata-container {
            height: 230px;
            padding: 10px;
            border-top: 1px solid #333;
            overflow-y: auto;
            background-color: #111;
            font-size: 12px;
        }

        .viewer-container {
            flex: 1;
            display: flex;
            flex-direction: column;
            position: relative;
        }

        .toolbar {
            padding: 10px;
            background-color: #1a1a1a;
            display: flex;
            gap: 15px;
            border-bottom: 1px solid #333;
            align-items: center;
        }

        .tool-group {
            display: flex;
            gap: 5px;
            border-right: 1px solid #333;
            padding-right: 15px;
            align-items: center;
        }

        .toolButton {
            background: none;
            border: 1px solid #333;
            color: #fff;
            padding: 8px 12px;
            border-radius: 4px;
            cursor: pointer;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            gap: 5px;
        }

        .toolButton:hover {
            background-color: #333;
            border-color: #444;
        }

        .toolButton.active {
            background-color: #2c5282;
            border-color: #4299e1;
            color: white;
        }

        .image-container {
            flex: 1;
            position: relative;
            background-color: #000;
            overflow: hidden;
            display: flex;
        }

        .cornerstone-element {
            width: 100%;
            height: 100%;
            position: relative;
            display: inline-block;
        }

        .viewport-overlay {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            pointer-events: none;
            padding: 15px;
            color: #f8cc1b;
            font-family: monospace;
            font-size: 14px;
            text-shadow: 1px 1px 2px black;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
        }

        .overlay-item {
            pointer-events: none;
        }

        #bottomright {
            display: flex;
            flex-direction: column;
            align-items: flex-end;
        }

        .thumbnail {
            width: 100%;
            background-color: #111;
            border: 2px solid transparent;
            border-radius: 4px;
            cursor: pointer;
            margin-bottom: 10px;
            position: relative;
            overflow: hidden;
            transition: border-color 0.2s;
        }

        .thumbnail.active {
            border-color: #4bd396;
        }

        .thumbnail canvas {
            width: 100% !important;
            height: 100% !important;
            object-fit: contain;
        }

        .thumbnail-info {
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            background: rgba(0, 0, 0, 0.7);
            padding: 4px;
            font-size: 11px;
            text-align: center;
        }

        .frames-sidebar {
            width: 120px;
            background-color: #111;
            overflow-y: auto;
            border-left: 1px solid #333;
            display: none;
            padding: 10px;
        }

        .frame-item {
            margin-bottom: 5px;
            text-align: center;
            cursor: pointer;
            padding: 5px;
            border: 1px solid #333;
            border-radius: 4px;
            font-size: 12px;
        }

        .frame-item.active {
            background-color: #2c5282;
            border-color: #4299e1;
        }

        .frame-item:hover {
            background-color: #333;
        }

        .app-footer {
            background-color: #1a1a1a;
            padding: 5px 15px;
            border-top: 1px solid #333;
            font-size: 12px;
            color: #888;
            display: flex;
            justify-content: space-between;
        }

        .dropdown {
            position: relative;
            display: inline-block;
        }

        .dropdown-content {
            display: none;
            position: absolute;
            background-color: #1a1a1a;
            min-width: 160px;
            box-shadow: 0px 8px 16px 0px rgba(0, 0, 0, 0.5);
            z-index: 1000;
            border: 1px solid #333;
            border-radius: 4px;
            top: 100%;
            left: 0;
        }

        .dropdown-content .toolButton {
            width: 100%;
            border: none;
            border-bottom: 1px solid #333;
            border-radius: 0;
            text-align: left;
            padding: 10px 15px;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .dropdown-content .toolButton:last-child {
            border-bottom: none;
        }

        .dropdown:focus-within .dropdown-content {
            display: block;
        }

        .playback-controls {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-left: auto;
        }

        input[type="range"] {
            -webkit-appearance: none;
            appearance: none;
            width: 150px;
            background: transparent;
        }

        input[type="range"]::-webkit-slider-thumb {
            -webkit-appearance: none;
            height: 16px;
            width: 16px;
            border-radius: 50%;
            background: #4bd396;
            cursor: pointer;
            margin-top: -6px;
        }

        input[type="range"]::-webkit-slider-runnable-track {
            width: 100%;
            height: 4px;
            cursor: pointer;
            background: #333;
            border-radius: 2px;
        }
    </style>
    <script>
        var mlite = { token: "{$_SESSION['token']}", url: "{?=url()?}", admin: "{?=ADMIN?}" };
    </script>
</head>

<body id="dicomViewer">
    <div class="app-container">
        <div class="main-content">
            <div class="sidebar">
                <div class="metadata-container">
                    <h3>Metadata DICOM</h3>
                    <div id="dicomMetadata"></div>
                </div>
                <div class="series-container" id="stackWrapper"></div>
            </div>

            <div class="viewer-container">
                <div class="toolbar">
                    <div class="tool-group">
                        <button class="toolButton" id="wwwcTool" title="Window Width/Window Center"><i
                                class="fa fa-adjust"></i></button>
                        <button class="toolButton" id="zoomTool" title="Zoom"><i class="fa fa-search-plus"></i></button>
                        <button class="toolButton" id="panTool" title="Pan"><i class="fa fa-hand-paper-o"></i></button>
                        <button class="toolButton" id="magnifyTool" title="Magnify"><i
                                class="fa fa-search"></i></button>
                        <button class="toolButton" id="invertTool" title="Invert Colors"><i
                                class="fa fa-toggle-on"></i></button>
                        <button class="toolButton" id="resetTool" title="Reset Image"><i
                                class="fa fa-undo"></i></button>
                    </div>

                    <div class="tool-group">
                        <div class="dropdown">
                            <button class="toolButton dropdown-toggle" id="annotationTools" title="Annotation Tools">
                                <i class="fa fa-caret-square-o-down"></i> Annotations
                            </button>
                            <div class="dropdown-content" id="annotationDropdown">
                                <button class="toolButton" id="lengthTool" title="Length Measurement"><i
                                        class="fa fa-arrows-h"></i> Length</button>
                                <button class="toolButton" id="angleTool" title="Angle Measurement"><i
                                        class="fa fa-location-arrow"></i> Angle</button>
                                <button class="toolButton" id="probeTool" title="Probe"><i class="fa fa-crosshairs"></i>
                                    Probe</button>
                                <button class="toolButton" id="ellipticalRoiTool" title="Elliptical ROI"><i
                                        class="fa fa-circle-o"></i> Elliptical ROI</button>
                                <button class="toolButton" id="rectangleRoiTool" title="Rectangle ROI"><i
                                        class="fa fa-square-o"></i> Rectangle ROI</button>
                                <button class="toolButton" id="freehandRoiTool" title="Freehand ROI"><i
                                        class="fa fa-pencil"></i> Freehand ROI</button>
                            </div>
                        </div>
                        <button class="toolButton" id="eraserTool" title="Eraser"><i class="fa fa-eraser"></i></button>
                    </div>

                    <div class="tool-group">
                        <button class="toolButton" id="playClip" title="Play/Pause Cine">
                            <i class="fa fa-play"></i>
                        </button>
                        <div class="playback-controls">
                            <input type="range" id="frameSlider" min="0" max="0" value="0" step="1">
                            <span id="frameCounter">Image: 1/1</span>
                        </div>
                    </div>
                </div>

                <div class="image-container">
                    <div id="dicomImage" class="cornerstone-element"></div>
                    <div class="viewport-overlay">
                        <div class="overlay-item" id="bottomleft"></div>
                        <div class="overlay-item" id="bottomright">
                            <div id="bottomright1"></div>
                            <div id="bottomright2"></div>
                        </div>
                        <div class="overlay-item" id="topleft">
                            <div id="ctSliceInfo" style="color: #00ff00; font-weight: bold;"></div>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <footer class="app-footer">
            <span id="frameCount"></span>
            <span id="statusMessage"></span>
        </footer>
    </div>

    <!-- Scripts -->
    <script src="{?=url()?}/assets/jscripts/jquery.min.js"></script>
    <script src="{?=isset_or($baseUrl)?}/js/admin/diacom/hammer.js"></script>
    <script src="{?=isset_or($baseUrl)?}/js/admin/diacom/dicomParser.min.js"></script>
    <script src="{?=isset_or($baseUrl)?}/js/admin/diacom/cornerstone.js"></script>
    <script src="{?=isset_or($baseUrl)?}/js/admin/diacom/cornerstoneMath.min.js"></script>
    <script src="{?=isset_or($baseUrl)?}/js/admin/diacom/cornerstoneWADOImageLoader.bundle.min.js"></script>
    <script src="{?=isset_or($baseUrl)?}/js/admin/diacom/cornerstoneTools.js"></script>
    <script src="{?=url([ADMIN, 'mini_pacs', 'javascriptviewer', $studyId])?}"></script>
</body>

</html>
