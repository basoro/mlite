<script type="text/javascript">
  $("#form_soap").on("click", "#ai_generate_snomed_icd9", function(event){
    var baseURL = mlite.url + '/' + mlite.admin;
    event.preventDefault();
    var namaTindakan = $('input:text[name=icd9]').val();
    var kodeTindakan = $('#kode_icd9').text();

    if (!namaTindakan || !kodeTindakan || kodeTindakan === 'kode') {
      alert('Pilih prosedur ICD 9 terlebih dahulu.');
      return;
    }

    var button = $(this);
    var originalText = button.html();
    button.html('<i class="fa fa-spinner fa-spin"></i>').prop('disabled', true);

    $.ajax({
      type: 'POST',
      url: baseURL + '/dokter_igd/fetchaisnomedicd9?t=' + mlite.token,
      data: {
        kode_tindakan: kodeTindakan,
        nama_tindakan: namaTindakan
      },
      dataType: 'json',
      timeout: 20000
    })
    .done(function(response) {
      if (response && response.status === 'success' && response.data) {
        $('input:text[name=snomed_concept_id_icd9]').val(String(response.data.snomed_concept_id ?? '').trim());
        $('input:text[name=snomed_term_icd9]').val(String(response.data.snomed_term ?? '').trim());
      } else {
        alert((response && response.message) ? response.message : 'Gagal generate SNOMED-CT ICD 9.');
      }
    })
    .fail(function(xhr, status) {
      if (status === 'timeout') {
        alert('Permintaan generate SNOMED-CT ICD 9 timeout.');
      } else if (xhr && xhr.responseJSON && xhr.responseJSON.message) {
        alert(xhr.responseJSON.message);
      } else {
        alert('Gagal generate SNOMED-CT ICD 9.');
      }
    })
    .always(function() {
      button.html(originalText).prop('disabled', false);
    });
  });
</script>

    var no_rawat = $('input:text[name=no_rawat]').val();
    var kd_penyakit = $('#kode_icd10').text();
    var snomed_concept_id = $('input:text[name=snomed_concept_id]').val();
    var snomed_term = $('input:text[name=snomed_term]').val();

    var url = baseURL + '/dokter_igd/savemappingsnomedicd?t=' + mlite.token;

    $.post(url, {
      no_rawat: no_rawat,
      kd_penyakit: kd_penyakit,
      snomed_concept_id: snomed_concept_id,
      snomed_term: snomed_term,
      status_penyakit: 'Baru'
    }, function(response){
      if(response === '1') {
        $("#display_icd").show().load(baseURL + '/dokter_igd/displayicd?no_rawat=' + no_rawat + '&t=' + mlite.token);
        $('#notif').html("<div class=\"alert alert-success alert-dismissible fade in\" role=\"alert\" style=\"border-radius:0px;margin-top:-15px;\">"+
        "Mapping SNOMED-CT berhasil disimpan!"+
        "<button type=\"button\" class=\"close\" data-dismiss=\"alert\" aria-label=\"Close\">&times;</button>"+
        "</div>").show();
      } else {
        $('#notif').html("<div class=\"alert alert-danger alert-dismissible fade in\" role=\"alert\" style=\"border-radius:0px;margin-top:-15px;\">"+
        "Gagal menyimpan mapping SNOMED-CT. Pastikan diagnosa ICD 10 sudah tersimpan."+
        "<button type=\"button\" class=\"close\" data-dismiss=\"alert\" aria-label=\"Close\">&times;</button>"+
        "</div>").show();
      }
    });
  });
</script>
<script type="text/javascript">
  $("#form_soap").on("click", "#ai_generate_snomed", function(event){
    var baseURL = mlite.url + '/' + mlite.admin;
    event.preventDefault();
    var namaDiagnosa = $('input:text[name=icd10]').val();
    var kodeDiagnosa = $('#kode_icd10').text();

    if (!namaDiagnosa || !kodeDiagnosa || kodeDiagnosa === 'kode') {
      alert('Pilih diagnosa ICD 10 terlebih dahulu.');
      return;
    }

    var button = $(this);
    var originalText = button.html();
    button.html('<i class="fa fa-spinner fa-spin"></i>').prop('disabled', true);

    $.ajax({
      type: 'POST',
      url: baseURL + '/dokter_igd/fetchaisnomedicd?t=' + mlite.token,
      data: {
        kode_diagnosa: kodeDiagnosa,
        nama_diagnosa: namaDiagnosa
      },
      dataType: 'json',
      timeout: 20000
    })
    .done(function(response) {
      if (response && response.status === 'success' && response.data) {
        $('input:text[name=snomed_concept_id]').val(String(response.data.snomed_concept_id ?? '').trim());
        $('input:text[name=snomed_term]').val(String(response.data.snomed_term ?? '').trim());
      } else {
        alert((response && response.message) ? response.message : 'Gagal generate SNOMED-CT.');
      }
    })
    .fail(function(xhr, status) {
      if (status === 'timeout') {
        alert('Permintaan generate SNOMED-CT timeout.');
      } else if (xhr && xhr.responseJSON && xhr.responseJSON.message) {
        alert(xhr.responseJSON.message);
      } else {
        alert('Gagal generate SNOMED-CT.');
      }
    })
    .always(function() {
      button.html(originalText).prop('disabled', false);
    });
  });
</script>
